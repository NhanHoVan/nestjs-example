version: '3.9'
services:
  nestapp:
    container_name: nestapp
    image: nestapp:1.0.0
    build: .
    ports:
      - '${API_PORT}:3000'
    environment:
      - DB_TYPE=${DB_TYPE}
      - PG_USER=${PG_USER}
      - PG_PASSWORD=${PG_PASSWORD}
      - PG_DB=${PG_DB}
      - PG_PORT=${PG_PORT}
      - PG_HOST=${PG_HOST}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - FIREBASE_PRIVATE_KEY=${FIREBASE_PRIVATE_KEY}
      - FIREBASE_CLIENT_EMAIL=${FIREBASE_CLIENT_EMAIL}
    depends_on:
      - database
    volumes:
      - .:/app
    command: npm run start:prod
    networks:
      - nestjs_network

  database:
    container_name: database
    image: postgres:12
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: ${PG_DB}
    ports:
      - '${PG_PORT}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - nestjs_network

volumes:
  pgdata: {}

networks:
  nestjs_network:
    driver: bridge
